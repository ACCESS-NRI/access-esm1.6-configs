global:
    contact: "{{ metadata.contact }} ({{ metadata.email}})"
    base_configuration: "dev-preindustrial+concentrations"
    Conventions: "CF-1.11,ACDD-1.3"
    data_specification: "ACCESS-Output Data Specification v0.1.0-alpha"
    filename: "{{ __file__.name }}"
    date_created: "{{ __file__.mtime }}"
    date_metadata_modified: "{{ __datetime__.now }}"
    frequency: "{{ __file__.freq if __file__.freq is defined else 'fx'}}" 
    license: "{{ metadata.license }}"
    run_id: "{{ env.PAYU_RUN_ID }}"
    variable_id: "{{ __file__.var if __file__.var is defined }}" 
    model: "{{ metadata.model }}"
    experiment_uuid: "{{ metadata.experiment_uuid }}"
    id: "{{ metadata.experiment_uuid }}"
    title: "{{ metadata.name }}"
    model_version: "{{ metadata.version }}"
    experiment_repo: "{{ metadata.url }}"
    grid: "access-1deg-global"
    realm: "{{ __argdata__.realm }}"

# Attrs/renames for missing vars will be ignored (i.e. time for freq=fx files)
variables:
  time:
    axis: "T"
    bounds: "time_bnds"
    calendar: "proleptic_gregorian"
    calendar_type:
    long_name: "time"
    standard_name: "time"

  # time_bnds should have no attributes
  # these are known attrs that should be removed
  time_bnds:
    axis:
    calendar:
    long_name:
    standard_name:
    units:
    missing_value:
    _FillValue:

rename:
  variables:
    # ice files use "time_bounds", rename to "time_bnds"
    time_bounds: time_bnds
    # ocean files have second "time_bnds" dimension as a variable too
    nv: bnds
  dimensions:
    # ice files use "d2" as the second dimension for "time_bnds"
    d2: bnds
    # ocean files use "nv" as the second dimension for "time_bnds"
    nv: bnds
